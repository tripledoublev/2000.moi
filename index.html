<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="20 100 c'est 2000. 2000.moi. vincent c'est 2000.">
    <meta property="og:title" content="2000.moi">
    <meta property="og:description" content="20 100 c'est 2000. vincent c'est 2000.">
    <meta property="og:type" content="website">
    <title>2000.moi</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f8f3e7;
        --ink: #101010;
        --blue: #0647ff;
        --red: #f03228;
        --green: #138a48;
        --yellow: #ffd23f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          linear-gradient(90deg, rgba(16, 16, 16, 0.045) 1px, transparent 1px),
          linear-gradient(0deg, rgba(16, 16, 16, 0.045) 1px, transparent 1px),
          var(--paper);
        background-size: 38px 38px;
        color: var(--ink);
        font-family: "Arial Black", Impact, system-ui, sans-serif;
        letter-spacing: 0;
      }

      main {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: clamp(24px, 6vw, 72px);
      }

      .poster {
        width: min(100%, 980px);
        border: 4px solid var(--ink);
        background: #fffdf7;
        box-shadow: 12px 12px 0 var(--ink);
        padding: clamp(22px, 6vw, 68px);
        position: relative;
        overflow: hidden;
      }

      .poster::before,
      .poster::after {
        content: "";
        position: absolute;
        border: 4px solid var(--ink);
        pointer-events: none;
      }

      .poster::before {
        width: 148px;
        height: 148px;
        right: -40px;
        top: -42px;
        background: var(--yellow);
        transform: rotate(12deg);
      }

      .poster::after {
        width: 96px;
        height: 96px;
        left: -22px;
        bottom: -26px;
        background: var(--green);
        transform: rotate(-18deg);
      }

      p,
      h1 {
        margin: 0;
        position: relative;
        z-index: 1;
      }

      .setup {
        max-width: 12ch;
        font-size: clamp(2.9rem, 11vw, 9rem);
        line-height: 0.86;
        text-transform: uppercase;
      }

      h1 {
        margin-top: clamp(28px, 5vw, 56px);
        color: var(--blue);
        font-size: clamp(4.1rem, 18vw, 15rem);
        line-height: 0.76;
        text-transform: lowercase;
        text-shadow: 6px 6px 0 var(--red);
        word-break: break-word;
      }

      .tagline {
        margin-top: clamp(28px, 5vw, 58px);
        display: inline-block;
        border: 4px solid var(--ink);
        background: var(--yellow);
        padding: 0.3em 0.42em;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: clamp(1.25rem, 4vw, 3rem);
        font-weight: 900;
        line-height: 1.05;
        transform: rotate(-1.5deg);
      }

      @media (max-width: 620px) {
        .poster {
          box-shadow: 7px 7px 0 var(--ink);
          border-width: 3px;
        }

        .poster::before {
          width: 108px;
          height: 108px;
        }

        .poster::after {
          width: 74px;
          height: 74px;
        }

        h1 {
          text-shadow: 4px 4px 0 var(--red);
        }

        .tagline {
          border-width: 3px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="poster" aria-label="2000.moi">
        <p class="setup">20 100<br>c'est 2000</p>
        <h1>2000.moi</h1>
        <p class="tagline">vincent c'est 2000</p>
      </section>
    </main>
  </body>
</html>
